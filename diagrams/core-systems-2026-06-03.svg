<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="'Noto Sans CJK SC', 'DejaVu Sans', sans-serif">
  <style>
    .title { font-size: 24px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #666; }
    .layer-label { font-size: 14px; font-weight: bold; fill: #fff; }
    .node-title { font-size: 13px; font-weight: bold; fill: #1a1a1a; }
    .node-text { font-size: 11px; fill: #333; }
    .node-muted { font-size: 10px; fill: #666; font-style: italic; }
    .user { fill: #FFE4B5; stroke: #FF8C00; stroke-width: 2; }
    .primary-agent { fill: #B0E0E6; stroke: #4682B4; stroke-width: 2; }
    .assist-agent { fill: #FFE4E1; stroke: #DC143C; stroke-width: 2; }
    .model { fill: #E6E6FA; stroke: #6A5ACD; stroke-width: 1.5; }
    .memory { fill: #F0FFF0; stroke: #2E8B57; stroke-width: 1.5; }
    .feishu { fill: #FFF0F5; stroke: #C71585; stroke-width: 1.5; }
    .flow { fill: #FFFACD; stroke: #DAA520; stroke-width: 1.5; }
    .cron { fill: #E0FFFF; stroke: #008B8B; stroke-width: 1.5; }
    .layer-bg { fill-opacity: 0.05; stroke-width: 1; stroke-dasharray: 4 4; }
    .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-dashed { stroke: #666; stroke-width: 1; fill: none; stroke-dasharray: 4 3; marker-end: url(#arrowhead); }
    .arrow-label { font-size: 10px; fill: #555; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="700" y="30" text-anchor="middle" class="title">🦞 OpenClaw 核心系统架构（2026-06-03）</text>
  <text x="700" y="50" text-anchor="middle" class="subtitle">Lee 主导 · 小马主协作 · 小龙虾助理协作者 · 5 层核心系统</text>

  <!-- 第 1 层：用户层 -->
  <rect x="20" y="80" width="1360" height="90" class="layer-bg" stroke="#888" />
  <rect x="40" y="100" width="160" height="50" rx="6" class="user" />
  <text x="120" y="125" text-anchor="middle" class="node-title">👤 Lee</text>
  <text x="120" y="142" text-anchor="middle" class="node-muted">主导 / 福州台江</text>

  <text x="700" y="80" text-anchor="middle" class="layer-label" fill="#444">━━ 第 1 层：用户层 ━━</text>

  <!-- 第 2 层：Agent 层 -->
  <rect x="20" y="190" width="1360" height="160" class="layer-bg" stroke="#4682B4" />
  <text x="700" y="190" text-anchor="middle" class="layer-label" fill="#4682B4">━━ 第 2 层：三 Agent 协作 ━━</text>

  <rect x="280" y="210" width="200" height="120" rx="8" class="primary-agent" />
  <text x="380" y="235" text-anchor="middle" class="node-title">🐴 小马（PC 本地）</text>
  <text x="380" y="260" text-anchor="middle" class="node-text">Lee 主要工具</text>
  <text x="380" y="280" text-anchor="middle" class="node-muted">xiaoma-openclaw</text>
  <text x="380" y="300" text-anchor="middle" class="node-muted">脚本/cron 在 PC</text>
  <text x="380" y="320" text-anchor="middle" class="node-muted">主导决策</text>

  <rect x="600" y="210" width="200" height="120" rx="8" class="assist-agent" />
  <text x="700" y="235" text-anchor="middle" class="node-title">🦞 小龙虾（我）</text>
  <text x="700" y="260" text-anchor="middle" class="node-text">助理协作者</text>
  <text x="700" y="280" text-anchor="middle" class="node-muted">xiaolongxia-openclaw</text>
  <text x="700" y="300" text-anchor="middle" class="node-muted">腾讯云服务器</text>
  <text x="700" y="320" text-anchor="middle" class="node-muted">cron / 飞书</text>

  <rect x="920" y="210" width="200" height="120" rx="8" class="primary-agent" />
  <text x="1020" y="235" text-anchor="middle" class="node-title">🧠 小马/Lee 上下文</text>
  <text x="1020" y="260" text-anchor="middle" class="node-text">SESSION-STATE.md</text>
  <text x="1020" y="280" text-anchor="middle" class="node-muted">短期记忆</text>
  <text x="1020" y="300" text-anchor="middle" class="node-muted">不跨 Agent 共享</text>
  <text x="1020" y="320" text-anchor="middle" class="node-muted">仅本会话</text>

  <line x1="120" y1="150" x2="380" y2="210" class="arrow" />
  <line x1="120" y1="150" x2="700" y2="210" class="arrow" />
  <line x1="380" y1="270" x2="700" y2="270" class="arrow" />
  <text x="540" y="263" text-anchor="middle" class="arrow-label">互惠约定：发现问题主动说</text>

  <!-- 第 3 层：模型路由 -->
  <rect x="20" y="370" width="1360" height="180" class="layer-bg" stroke="#6A5ACD" />
  <text x="700" y="370" text-anchor="middle" class="layer-label" fill="#6A5ACD">━━ 第 3 层：模型路由 ━━</text>

  <!-- 模型链路 -->
  <rect x="100" y="395" width="180" height="55" rx="6" class="model" />
  <text x="190" y="420" text-anchor="middle" class="node-title">minimax/M3</text>
  <text x="190" y="438" text-anchor="middle" class="node-muted">🟢 主</text>

  <rect x="350" y="395" width="180" height="55" rx="6" class="model" />
  <text x="440" y="420" text-anchor="middle" class="node-title">minimax/M2.7</text>
  <text x="440" y="438" text-anchor="middle" class="node-muted">🟡 fallback 1</text>

  <rect x="600" y="395" width="180" height="55" rx="6" class="model" />
  <text x="690" y="420" text-anchor="middle" class="node-title">deepseek/V4-Flash</text>
  <text x="690" y="438" text-anchor="middle" class="node-muted">🟡 fallback 2</text>

  <rect x="850" y="395" width="180" height="55" rx="6" class="model" />
  <text x="940" y="420" text-anchor="middle" class="node-title">deepseek/V4-Pro</text>
  <text x="940" y="438" text-anchor="middle" class="node-muted">⚪ 备用（按需）</text>

  <rect x="1100" y="395" width="220" height="55" rx="6" class="model" />
  <text x="1210" y="420" text-anchor="middle" class="node-title">Kimi K2.6 ❌</text>
  <text x="1210" y="438" text-anchor="middle" class="node-muted">仅编程 CLI 专用</text>

  <!-- 路由规则 -->
  <rect x="100" y="470" width="1220" height="65" rx="6" fill="#fafafa" stroke="#999" stroke-dasharray="3 3" />
  <text x="120" y="490" class="node-text" font-weight="bold">路由规则：</text>
  <text x="120" y="508" class="node-text">M3 (主) → M2.7 → V4-Flash → 报错。V4-Pro 手动切。DeepSeek v4 Flash 仅 cron（成本低）。</text>
  <text x="120" y="525" class="node-text" font-style="italic" fill="#666">主会话主力 = M3；cron 定时任务 = V4-Flash（已验证更稳更便宜）</text>

  <line x1="190" y1="395" x2="440" y2="395" class="arrow" />
  <line x1="440" y1="395" x2="690" y2="395" class="arrow" />
  <line x1="280" y1="270" x2="190" y2="395" class="arrow" />
  <line x1="700" y1="330" x2="190" y2="395" class="arrow" />

  <!-- 第 4 层：核心系统（4 块） -->
  <rect x="20" y="570" width="1360" height="220" class="layer-bg" stroke="#2E8B57" />
  <text x="700" y="570" text-anchor="middle" class="layer-label" fill="#2E8B57">━━ 第 4 层：4 大核心系统 ━━</text>

  <!-- 记忆系统 -->
  <rect x="60" y="595" width="310" height="180" rx="8" class="memory" />
  <text x="215" y="620" text-anchor="middle" class="node-title">📚 三层记忆系统</text>
  <text x="80" y="645" class="node-text">▸ MEMORY.md（长期索引）</text>
  <text x="80" y="665" class="node-text">▸ memory/YYYY-MM-DD.md（中期）</text>
  <text x="80" y="685" class="node-text">▸ SESSION-STATE.md（短期）</text>
  <text x="80" y="710" class="node-muted">优先级：长期 &gt; 中期 &gt; 当前 &gt; 联网</text>
  <text x="80" y="730" class="node-muted">L0 实时写入（重要决策）</text>
  <text x="80" y="750" class="node-muted">WAL 协议：三处同步</text>
  <text x="80" y="770" class="node-muted">GitHub 备份：xiaolongxia-openclaw</text>

  <!-- 飞书路由 -->
  <rect x="395" y="595" width="310" height="180" rx="8" class="feishu" />
  <text x="550" y="620" text-anchor="middle" class="node-title">📱 飞书群路由（6 群）</text>
  <text x="415" y="645" class="node-text">▸ 日常安排群（chat/work/health）</text>
  <text x="415" y="665" class="node-text">▸ 学习监督群（学习提醒）</text>
  <text x="415" y="685" class="node-text">▸ 新闻群（9:00 简报）</text>
  <text x="415" y="705" class="node-text">▸ 进化群（日报/Skill 安全）</text>
  <text x="415" y="725" class="node-text">▸ 内容收集群（收藏/书）</text>
  <text x="415" y="745" class="node-text">▸ 安全群（健康检查）</text>
  <text x="415" y="770" class="node-muted">chat_id 单一真相源（TOOLS.md）</text>

  <!-- 收藏流程 -->
  <rect x="730" y="595" width="310" height="180" rx="8" class="flow" />
  <text x="885" y="620" text-anchor="middle" class="node-title">📥 收藏流程（红线）</text>
  <text x="750" y="645" class="node-text">1. 提取核心要点（3-5 bullet）</text>
  <text x="750" y="665" class="node-text">2. 关联分析（找已有文档）</text>
  <text x="750" y="685" class="node-text">3. Obsidian 入库</text>
  <text x="750" y="705" class="node-text">4. frontmatter 回写 related:</text>
  <text x="750" y="725" class="node-text">5. git push 同步</text>
  <text x="750" y="745" class="node-text">6. 飞书汇报</text>
  <text x="750" y="770" class="node-muted">❌ 绝不只是回不复</text>

  <!-- Cron 系统 -->
  <rect x="1065" y="595" width="275" height="180" rx="8" class="cron" />
  <text x="1200" y="620" text-anchor="middle" class="node-title">⏰ Cron 系统</text>
  <text x="1085" y="645" class="node-text">▸ 36 个 enabled jobs</text>
  <text x="1085" y="665" class="node-text">▸ model = V4-Flash</text>
  <text x="1085" y="685" class="node-text">▸ channel:feishu + to:oc_xxx</text>
  <text x="1085" y="705" class="node-text">▸ 一次性任务即删</text>
  <text x="1085" y="725" class="node-muted">HEARTBEAT.md 全链路检查</text>
  <text x="1085" y="745" class="node-muted">⚠️ 改 model 用 cron update</text>
  <text x="1085" y="765" class="node-muted">不要直接编辑 jobs.json</text>

  <!-- 第 5 层：数据层 -->
  <rect x="20" y="810" width="1360" height="160" class="layer-bg" stroke="#888" />
  <text x="700" y="810" text-anchor="middle" class="layer-label" fill="#444">━━ 第 5 层：数据 / 基础设施 ━━</text>

  <rect x="60" y="830" width="240" height="100" rx="6" fill="#f9f9f9" stroke="#666" />
  <text x="180" y="855" text-anchor="middle" class="node-title">Obsidian 仓库</text>
  <text x="180" y="875" text-anchor="middle" class="node-muted">~/Obsidian/</text>
  <text x="180" y="895" text-anchor="middle" class="node-muted">共享数据层</text>
  <text x="180" y="915" text-anchor="middle" class="node-muted">三端通过 GitHub 同步</text>

  <rect x="320" y="830" width="240" height="100" rx="6" fill="#f9f9f9" stroke="#666" />
  <text x="440" y="855" text-anchor="middle" class="node-title">GitHub 仓库</text>
  <text x="440" y="875" text-anchor="middle" class="node-muted">xiaolongxia-openclaw</text>
  <text x="440" y="895" text-anchor="middle" class="node-muted">xiaoma-openclaw</text>
  <text x="440" y="915" text-anchor="middle" class="node-muted">本地是唯一真相源</text>

  <rect x="580" y="830" width="240" height="100" rx="6" fill="#f9f9f9" stroke="#666" />
  <text x="700" y="855" text-anchor="middle" class="node-title">微信读书</text>
  <text x="700" y="875" text-anchor="middle" class="node-muted">.env WEREAD_API_KEY</text>
  <text x="700" y="895" text-anchor="middle" class="node-muted">每日书籍推荐</text>
  <text x="700" y="915" text-anchor="middle" class="node-muted">errcode -2010 重新签发</text>

  <rect x="840" y="830" width="240" height="100" rx="6" fill="#f9f9f9" stroke="#666" />
  <text x="960" y="855" text-anchor="middle" class="node-title">OpenClaw 配置</text>
  <text x="960" y="875" text-anchor="middle" class="node-muted">openclaw.json</text>
  <text x="960" y="895" text-anchor="middle" class="node-muted">+ .env（API keys）</text>
  <text x="960" y="915" text-anchor="middle" class="node-muted">+ cron/jobs.json</text>

  <rect x="1100" y="830" width="240" height="100" rx="6" fill="#f9f9f9" stroke="#666" />
  <text x="1220" y="855" text-anchor="middle" class="node-title">Skill 系统</text>
  <text x="1220" y="875" text-anchor="middle" class="node-muted">workspace/skills/</text>
  <text x="1220" y="895" text-anchor="middle" class="node-muted">触发式 + 手动</text>
  <text x="1220" y="915" text-anchor="middle" class="node-muted">sklearn-feishu 等 30+</text>

  <line x1="215" y1="775" x2="180" y2="830" class="arrow-dashed" />
  <line x1="550" y1="775" x2="440" y2="830" class="arrow-dashed" />
  <line x1="885" y1="775" x2="700" y2="830" class="arrow-dashed" />
  <line x1="1200" y1="775" x2="960" y2="830" class="arrow-dashed" />
  <line x1="1200" y1="775" x2="1220" y2="830" class="arrow-dashed" />

  <text x="700" y="990" text-anchor="middle" class="node-muted" fill="#666">2026-06-03 by 小龙虾 · 5 层架构：用户 / Agent / 模型路由 / 4 大核心系统 / 数据基础设施</text>
</svg>
