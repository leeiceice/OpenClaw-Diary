<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">
  <rect width="1400" height="900" fill="#0f1419"/>

  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" fill="#e6e6e6" font-size="26" font-weight="bold">&#x1F990; 小龙虾系统 · 5 个常驻核心框架（任务生命周期闭环）</text>
  <text x="700" y="65" text-anchor="middle" fill="#8b949e" font-size="13">2026-06-08 v2 · Lee 问 → 处理 → 完成 → 沉淀 → 回到 Lee 问 · 闭环循环</text>

  <!-- ============== 外环：大闭环（4 阶段） ============== -->

  <!-- 中心圆 -->
  <circle cx="700" cy="490" r="180" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="700" y="475" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">任务</text>
  <text x="700" y="495" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="bold">生命周期</text>
  <text x="700" y="520" text-anchor="middle" fill="#8b949e" font-size="12">单次任务跑一圈</text>

  <!-- 阶段 1：Lee 问（顶部） -->
  <g>
    <rect x="600" y="120" width="200" height="80" rx="40" fill="#58a6ff" opacity="0.9"/>
    <text x="700" y="148" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">&#x1F4AC; Lee 提问/任务</text>
    <text x="700" y="172" text-anchor="middle" fill="#c9d1d9" font-size="11">飞书 DM / 命令</text>
    <text x="700" y="188" text-anchor="middle" fill="#c9d1d9" font-size="11">起点</text>
  </g>

  <!-- 阶段 2：处理中（右侧） -->
  <g>
    <rect x="1080" y="430" width="200" height="80" rx="8" fill="#1f6feb" opacity="0.85"/>
    <text x="1180" y="458" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">&#x1F6E0; 处理中</text>
    <text x="1180" y="482" text-anchor="middle" fill="#c9d1d9" font-size="11">工具调用</text>
    <text x="1180" y="498" text-anchor="middle" fill="#c9d1d9" font-size="11">5 个核心框架协同</text>
  </g>

  <!-- 阶段 3：飞书回报（底部） -->
  <g>
    <rect x="600" y="780" width="200" height="80" rx="8" fill="#a371f7" opacity="0.85"/>
    <text x="700" y="808" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">&#x1F4E4; 飞书回报</text>
    <text x="700" y="832" text-anchor="middle" fill="#c9d1d9" font-size="11">路由到对应群</text>
    <text x="700" y="848" text-anchor="middle" fill="#c9d1d9" font-size="11">6 群按性质分流</text>
  </g>

  <!-- 阶段 4：三层记忆沉淀（左侧） -->
  <g>
    <rect x="120" y="430" width="200" height="80" rx="8" fill="#3fb950" opacity="0.85"/>
    <text x="220" y="458" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">&#x1F4DA; 三层记忆沉淀</text>
    <text x="220" y="482" text-anchor="middle" fill="#c9d1d9" font-size="11">L0 → L1 → L2</text>
    <text x="220" y="498" text-anchor="middle" fill="#c9d1d9" font-size="11">下次任务的输入</text>
  </g>

  <!-- 闭环箭头 -->
  <g stroke="#58a6ff" stroke-width="3" fill="none" opacity="0.7">
    <!-- Lee 问 → 处理中（顺时针）-->
    <path d="M 800 170 Q 950 200 1080 430" marker-end="url(#arrow)"/>
    <!-- 处理中 → 飞书回报 -->
    <path d="M 1080 510 Q 950 750 800 820" marker-end="url(#arrow)"/>
    <!-- 飞书回报 → 三层记忆 -->
    <path d="M 600 820 Q 450 750 320 510" marker-end="url(#arrow)"/>
    <!-- 三层记忆 → Lee 问（闭环）-->
    <path d="M 320 430 Q 450 200 600 170" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- ============== 中心：5 个核心框架（嵌入处理中阶段） ============== -->

  <g font-size="11" fill="#e6e6e6">
    <!-- 5 个核心在中心圆内排成梅花阵 -->
    <!-- 1. 任务确认红线（左上）-->
    <g>
      <rect x="540" y="380" width="150" height="50" rx="6" fill="#da3633" opacity="0.85"/>
      <text x="615" y="400" text-anchor="middle" font-weight="bold">&#x1F6E1; 任务确认红线</text>
      <text x="615" y="418" text-anchor="middle" fill="#c9d1d9" font-size="10">红线内做/外必问</text>
    </g>

    <!-- 2. 反信息茧房 3 条（右上）-->
    <g>
      <rect x="710" y="380" width="150" height="50" rx="6" fill="#d29922" opacity="0.85"/>
      <text x="785" y="400" text-anchor="middle" font-weight="bold">&#x1F914; 反信息茧房</text>
      <text x="785" y="418" text-anchor="middle" fill="#c9d1d9" font-size="10">3 条自检常驻</text>
    </g>

    <!-- 3. 三层记忆（中心）-->
    <g>
      <rect x="625" y="450" width="150" height="50" rx="6" fill="#3fb950" opacity="0.9"/>
      <text x="700" y="470" text-anchor="middle" font-weight="bold">&#x1F4DA; 三层记忆</text>
      <text x="700" y="488" text-anchor="middle" fill="#c9d1d9" font-size="10">L0/L1/L2 贯穿全程</text>
    </g>

    <!-- 4. 任务收尾 3 项（左下）-->
    <g>
      <rect x="540" y="520" width="150" height="50" rx="6" fill="#58a6ff" opacity="0.85"/>
      <text x="615" y="540" text-anchor="middle" font-weight="bold">&#x2705; 任务收尾 3 项</text>
      <text x="615" y="558" text-anchor="middle" fill="#c9d1d9" font-size="10">L0+corrections+自检</text>
    </g>

    <!-- 5. 飞书推送路由（右下）-->
    <g>
      <rect x="710" y="520" width="150" height="50" rx="6" fill="#a371f7" opacity="0.85"/>
      <text x="785" y="540" text-anchor="middle" font-weight="bold">&#x1F4E4; 飞书推送路由</text>
      <text x="785" y="558" text-anchor="middle" fill="#c9d1d9" font-size="10">任务性质→6 群</text>
    </g>
  </g>

  <!-- ============== 4 个阶段的详细说明 ============== -->

  <!-- 阶段 1 详细说明（左侧） -->
  <g>
    <rect x="50" y="600" width="320" height="270" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="210" y="625" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">&#x1F4AC; Lee 提问/任务 详细说明</text>
    <text x="65" y="652" fill="#c9d1d9" font-size="11">&#x2022; 渠道: 飞书 DM（默认）</text>
    <text x="65" y="672" fill="#c9d1d9" font-size="11">&#x2022; 输入: 文字/图片/文件/链接</text>
    <text x="65" y="692" fill="#c9d1d9" font-size="11">&#x2022; 触发: 显式提问 或 隐含请求</text>
    <text x="65" y="712" fill="#8b949e" font-size="11">&#x2022; 本次示例: "列出系统有层级的"</text>
    <text x="65" y="732" fill="#8b949e" font-size="11">  "框架结构目录给我"</text>
    <text x="65" y="758" fill="#8b949e" font-size="11">--- 框架 #1 触发点 ---</text>
    <text x="65" y="778" fill="#da3633" font-size="11">&#x1F6E1; 任务确认红线: 理解+分解</text>
    <text x="65" y="798" fill="#da3633" font-size="11">   判断是否在红线内</text>
    <text x="65" y="818" fill="#da3633" font-size="11">   外部动作先确认</text>
    <text x="65" y="845" fill="#8b949e" font-size="10">来源: SOUL.md 红线段</text>
  </g>

  <!-- 阶段 2 详细说明（右侧） -->
  <g>
    <rect x="1030" y="600" width="320" height="270" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="1190" y="625" text-anchor="middle" fill="#1f6feb" font-size="14" font-weight="bold">&#x1F6E0; 处理中 详细说明</text>
    <text x="1045" y="652" fill="#c9d1d9" font-size="11">&#x2022; 工具调用: 读/写/搜索/推送</text>
    <text x="1045" y="672" fill="#c9d1d9" font-size="11">&#x2022; 5 个核心框架在此协同:</text>
    <text x="1045" y="695" fill="#da3633" font-size="10">  &#x1F6E1; 红线判断（不在则问）</text>
    <text x="1045" y="712" fill="#d29922" font-size="10">  &#x1F914; 反信息茧房（每个判断）</text>
    <text x="1045" y="729" fill="#3fb950" font-size="10">  &#x1F4DA; 三层记忆（查 L1/L2）</text>
    <text x="1045" y="746" fill="#58a6ff" font-size="10">  &#x2705; 收尾 3 项（准备自查）</text>
    <text x="1045" y="763" fill="#a371f7" font-size="10">  &#x1F4E4; 推送路由（决定目标群）</text>
    <text x="1045" y="788" fill="#8b949e" font-size="11">--- 本次协同 ---</text>
    <text x="1045" y="808" fill="#8b949e" font-size="10">红线: 内部查询-主动做</text>
    <text x="1045" y="824" fill="#8b949e" font-size="10">茧房: 5 个核心是验证的</text>
    <text x="1045" y="845" fill="#8b949e" font-size="10">记忆: 扫 MEMORY.md + memory/</text>
  </g>

  <!-- 阶段 3 详细说明（底部左） -->
  <g>
    <rect x="430" y="600" width="320" height="270" rx="8" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/>
    <text x="590" y="625" text-anchor="middle" fill="#a371f7" font-size="14" font-weight="bold">&#x1F4E4; 飞书回报 详细说明</text>
    <text x="445" y="652" fill="#c9d1d9" font-size="11">&#x2022; 路由原则（06-03 Lee 授权）:</text>
    <text x="445" y="672" fill="#c9d1d9" font-size="10">  行为/任务 → 日常安排群</text>
    <text x="445" y="689" fill="#c9d1d9" font-size="10">  技术/进化 → 进化群</text>
    <text x="445" y="706" fill="#c9d1d9" font-size="10">  新闻/书/文 → 新闻/内容群</text>
    <text x="445" y="723" fill="#c9d1d9" font-size="10">  系统安全 → 安全群</text>
    <text x="445" y="740" fill="#c9d1d9" font-size="10">  不确定 → 进化群（兜底）</text>
    <text x="445" y="765" fill="#8b949e" font-size="11">--- 框架 #5 落地 ---</text>
    <text x="445" y="785" fill="#a371f7" font-size="11">&#x1F4E4; 推送路由触发点</text>
    <text x="445" y="803" fill="#a371f7" font-size="10">  本次: 内容梳理 → 内容群</text>
    <text x="445" y="819" fill="#a371f7" font-size="10">  chat_id 自主判断不需确认</text>
    <text x="445" y="845" fill="#8b949e" font-size="10">来源: MEMORY.md 推送路由原则</text>
  </g>

  <!-- 阶段 4 详细说明（底部右） -->
  <g>
    <rect x="760" y="600" width="320" height="270" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
    <text x="920" y="625" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="bold">&#x1F4DA; 三层记忆沉淀 详细说明</text>
    <text x="775" y="652" fill="#c9d1d9" font-size="11">&#x2022; L0: 本次会话上下文（实时）</text>
    <text x="775" y="672" fill="#c9d1d9" font-size="11">&#x2022; L1: memory/YYYY-MM-DD.md</text>
    <text x="775" y="689" fill="#c9d1d9" font-size="10">  (78 篇, 实时写入)</text>
    <text x="775" y="706" fill="#c9d1d9" font-size="11">&#x2022; L2: MEMORY.md（v3.8）</text>
    <text x="775" y="723" fill="#c9d1d9" font-size="10">  (永久索引+红线)</text>
    <text x="775" y="748" fill="#8b949e" font-size="11">--- 闭环关键 ---</text>
    <text x="775" y="768" fill="#3fb950" font-size="11">&#x1F4DA; 沉淀 = 下次任务的输入</text>
    <text x="775" y="786" fill="#3fb950" font-size="10">  本次: 骨干图+搜索图+纠正</text>
    <text x="775" y="802" fill="#3fb950" font-size="10">  → 写 L0（10:32/10:42/10:53）</text>
    <text x="775" y="818" fill="#3fb950" font-size="10">  → 写 corrections dev_xxx_002</text>
    <text x="775" y="845" fill="#8b949e" font-size="10">来源: AGENTS.md L0 写入判断</text>
  </g>

  <!-- 底部说明 -->
  <text x="700" y="888" text-anchor="middle" fill="#8b949e" font-size="11">&#x1F4DA; 闭环逻辑: Lee 问 → 处理 → 回报 → 沉淀 → 沉淀物成为下次 Lee 问的输入（不沉淀 = 死循环）</text>
</svg>
