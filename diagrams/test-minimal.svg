<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">
  <rect width="600" height="200" fill="#0f1419"/>
  <rect x="50" y="70" width="120" height="60" rx="6" fill="#1f6feb"/>
  <text x="110" y="105" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">块 A</text>
  <line x1="170" y1="100" x2="280" y2="100" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="225" y="92" text-anchor="middle" fill="#8b949e" font-size="10">动作 1</text>
  <rect x="280" y="70" width="120" height="60" rx="6" fill="#3fb950"/>
  <text x="340" y="105" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">块 B</text>
  <line x1="400" y1="100" x2="500" y2="100" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="450" y="92" text-anchor="middle" fill="#8b949e" font-size="10">动作 2</text>
  <rect x="510" y="70" width="120" height="60" rx="6" fill="#a371f7"/>
  <text x="570" y="105" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">块 C</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff"/>
    </marker>
  </defs>
  <text x="300" y="180" text-anchor="middle" fill="#8b949e" font-size="11">极简测试图：3 块 + 2 箭头</text>
</svg>
